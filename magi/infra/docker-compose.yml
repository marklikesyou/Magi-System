version: "3.9"

services:
  api:
    build: ..
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DATABASE_URL=postgresql://pg:pg@db:5432/magi
    ports:
      - "8080:8080"
    depends_on:
      - db
      - langfuse

  db:
    image: ankane/pgvector
    environment:
      - POSTGRES_USER=pg
      - POSTGRES_PASSWORD=pg
      - POSTGRES_DB=magi
    ports:
      - "5432:5432"

  langfuse:
    image: langfuse/langfuse
    environment:
      - DATABASE_URL=postgresql://pg:pg@db:5432/langfuse
    ports:
      - "3000:3000"
    depends_on:
      - db
