version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["chat", "--help"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-pg}@db:5432/magi
    depends_on:
      db:
        condition: service_healthy
      langfuse:
        condition: service_started
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 2G

  db:
    image: ankane/pgvector
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-pg}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pg}
      - POSTGRES_DB=magi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pg}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  langfuse:
    image: langfuse/langfuse
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pg}:${POSTGRES_PASSWORD:-pg}@db:5432/langfuse
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
