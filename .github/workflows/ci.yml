name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-test:
    runs-on: ubuntu-latest

    env:
      MAGI_FORCE_DSPY_STUB: "1"
      MAGI_FORCE_HASH_EMBEDDER: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --extra dev --extra openai

      - name: Lint
        run: uv run ruff check magi/

      - name: Type check
        run: uv run mypy magi/ --ignore-missing-imports

      - name: Run tests
        run: uv run pytest magi/tests/ -v --tb=short
